<!DOCTYPE html>
<html lang="id" dir="ltr">
<head>
  <!-- ── Meta ──────────────────────────────────────────────── -->
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FDFBF7" />
  <meta name="description"
        content="A special birthday garden, crafted with love — for Azka." />
  <!-- Prevent search engines from indexing this personal gift -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- iOS web-app meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Azka's Garden" />

  <title>Azka's Garden 🌸</title>

  <!-- ── Preconnect (fonts) ─────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ── Favicon (inline SVG flower) ───────────────────────── -->
  <link rel="icon" href="data:image/svg+xml,
    %3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E
      %3Ccircle cx='16' cy='16' r='5' fill='%23D4AF37'/%3E
      %3Cellipse cx='16' cy='7' rx='4' ry='6' fill='%23E8B4B8' opacity='.85'/%3E
      %3Cellipse cx='16' cy='25' rx='4' ry='6' fill='%23E8B4B8' opacity='.85'/%3E
      %3Cellipse cx='7' cy='16' rx='6' ry='4' fill='%23E8B4B8' opacity='.85'/%3E
      %3Cellipse cx='25' cy='16' rx='6' ry='4' fill='%23E8B4B8' opacity='.85'/%3E
      %3Cellipse cx='9.5' cy='9.5' rx='4' ry='6'
        transform='rotate(-45 9.5 9.5)' fill='%23F2D0D3' opacity='.75'/%3E
      %3Cellipse cx='22.5' cy='9.5' rx='4' ry='6'
        transform='rotate(45 22.5 9.5)' fill='%23F2D0D3' opacity='.75'/%3E
      %3Cellipse cx='9.5' cy='22.5' rx='4' ry='6'
        transform='rotate(45 9.5 22.5)' fill='%23F2D0D3' opacity='.75'/%3E
      %3Cellipse cx='22.5' cy='22.5' rx='4' ry='6'
        transform='rotate(-45 22.5 22.5)' fill='%23F2D0D3' opacity='.75'/%3E
    %3C/svg%3E" />

  <!-- ── Design System ─────────────────────────────────────── -->
  <link rel="stylesheet" href="./styles/variables.css" />
  <link rel="stylesheet" href="./styles/main.css" />

  <!-- ── GSAP 3 (CDN) ──────────────────────────────────────── -->
  <!-- Core must load before plugins and main.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"></script>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════
       NOISE OVERLAY — paper texture, always on top
       pointer-events: none set in CSS; z-index: var(--z-noise)
  ════════════════════════════════════════════════════════════ -->
  <div id="noise-overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════════════
       LOADING SCREEN
       Dismissed by main.js after initial parse completes.
  ════════════════════════════════════════════════════════════ -->
  <div id="loading-screen" role="status" aria-live="polite" aria-label="Loading garden…">

    <!-- Animated botanical flower spinner (inline SVG, no HTTP request) -->
    <svg class="loading-flower"
         viewBox="0 0 60 60"
         fill="none"
         xmlns="http://www.w3.org/2000/svg"
         aria-hidden="true">
      <!-- 8 petals, rotated via transform -->
      <g transform-origin="30 30">
        <ellipse cx="30" cy="12" rx="6" ry="10" fill="#E8B4B8" opacity="0.90"/>
        <ellipse cx="30" cy="48" rx="6" ry="10" fill="#E8B4B8" opacity="0.90"/>
        <ellipse cx="12" cy="30" rx="10" ry="6" fill="#E8B4B8" opacity="0.90"/>
        <ellipse cx="48" cy="30" rx="10" ry="6" fill="#E8B4B8" opacity="0.90"/>
        <ellipse cx="14.7" cy="14.7" rx="6" ry="10"
                 transform="rotate(-45 14.7 14.7)" fill="#F2D0D3" opacity="0.75"/>
        <ellipse cx="45.3" cy="14.7" rx="6" ry="10"
                 transform="rotate(45 45.3 14.7)"  fill="#F2D0D3" opacity="0.75"/>
        <ellipse cx="14.7" cy="45.3" rx="6" ry="10"
                 transform="rotate(45 14.7 45.3)"  fill="#F2D0D3" opacity="0.75"/>
        <ellipse cx="45.3" cy="45.3" rx="6" ry="10"
                 transform="rotate(-45 45.3 45.3)" fill="#F2D0D3" opacity="0.75"/>
      </g>
      <!-- Golden centre -->
      <circle cx="30" cy="30" r="7" fill="#D4AF37"/>
      <circle cx="30" cy="30" r="4" fill="#E8CC6A"/>
    </svg>

    <p class="loading-text">Sedang menyiapkan taman bunga untukmu…</p>

    <div class="loading-bar-track" role="progressbar"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="loading-bar-fill"></div>
    </div>

  </div><!-- /#loading-screen -->

  <!-- ═══════════════════════════════════════════════════════
       PARTICLE CANVAS — ambient pollen, fixed overlay
  ════════════════════════════════════════════════════════════ -->
  <canvas id="particle-canvas"
          aria-hidden="true"
          title="Ambient pollen particles"></canvas>

  <!-- ═══════════════════════════════════════════════════════
       APP SHELL — all scenes mount here
  ════════════════════════════════════════════════════════════ -->
  <div id="app">

    <!--
      ┌──────────────────────────────────────────────────────┐
      │  SCENES will be injected here in subsequent phases.  │
      │                                                       │
      │  Scene 0 — Preloader / Wax Seal Unboxing             │
      │  Scene 1 — The Letter                                 │
      │  Scene 2 — Scrapbook of Memories                      │
      │  Scene 3 — Across the Distance (Map)                  │
      │  Scene 4 — Voice Note & Music                         │
      │  Scene 5 — Finale Garden & Birthday Cake              │
      └──────────────────────────────────────────────────────┘
    -->

    <!-- Phase 1 placeholder — confirms foundation is working -->
    <div id="scene-placeholder"
         style="
           position: absolute;
           inset: 0;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           gap: 1.5rem;
           text-align: center;
           padding: 2rem;
           opacity: 0;
         "
         aria-hidden="true">

      <svg viewBox="0 0 80 80" width="80" height="80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform-origin="40 40">
          <ellipse cx="40" cy="16" rx="8" ry="13" fill="#E8B4B8" opacity="0.9"/>
          <ellipse cx="40" cy="64" rx="8" ry="13" fill="#E8B4B8" opacity="0.9"/>
          <ellipse cx="16" cy="40" rx="13" ry="8" fill="#E8B4B8" opacity="0.9"/>
          <ellipse cx="64" cy="40" rx="13" ry="8" fill="#E8B4B8" opacity="0.9"/>
          <ellipse cx="19.7" cy="19.7" rx="8" ry="13"
                   transform="rotate(-45 19.7 19.7)" fill="#F2D0D3" opacity="0.75"/>
          <ellipse cx="60.3" cy="19.7" rx="8" ry="13"
                   transform="rotate(45 60.3 19.7)"  fill="#F2D0D3" opacity="0.75"/>
          <ellipse cx="19.7" cy="60.3" rx="8" ry="13"
                   transform="rotate(45 19.7 60.3)"  fill="#F2D0D3" opacity="0.75"/>
          <ellipse cx="60.3" cy="60.3" rx="8" ry="13"
                   transform="rotate(-45 60.3 60.3)" fill="#F2D0D3" opacity="0.75"/>
        </g>
        <circle cx="40" cy="40" r="10" fill="#D4AF37"/>
        <circle cx="40" cy="40" r="6"  fill="#E8CC6A"/>
      </svg>

      <div>
        <p style="
          font-family: 'Dancing Script', cursive;
          font-size: clamp(1.4rem, 3vw, 2rem);
          color: #3D2B1F;
          margin-bottom: 0.5rem;
        ">Foundation Ready</p>
        <p style="
          font-family: 'Lato', sans-serif;
          font-size: clamp(0.8rem, 1.5vw, 0.875rem);
          color: #9B8B82;
          letter-spacing: 0.12em;
          text-transform: uppercase;
        ">Phase 1 — Awaiting Scene Architecture</p>
      </div>

      <div class="ornament" style="width: 200px; color: #D4AF37;">
        <span>✦</span>
      </div>

      <div style="
        display: flex;
        gap: 1rem;
        font-family: 'Lato', sans-serif;
        font-size: 0.75rem;
        color: #9B8B82;
        letter-spacing: 0.06em;
      ">
        <span id="dbg-gsap">GSAP –</span>
        <span>·</span>
        <span id="dbg-particles">Particles –</span>
        <span>·</span>
        <span id="dbg-state">State –</span>
      </div>
    </div>

  </div><!-- /#app -->

  <!-- ═══════════════════════════════════════════════════════
       MODULE SCRIPTS — order matters:
         1. BouquetState  (no deps)
         2. ParticleEngine (no deps)
         3. main.js       (depends on both above + GSAP CDN)
  ════════════════════════════════════════════════════════════ -->
  <script src="./js/BouquetState.js"></script>
  <script src="./js/ParticleEngine.js"></script>
  <script src="./js/main.js"></script>

  <!-- Phase 1 diagnostic — runs after Garden is ready -->
  <script>
    document.addEventListener('garden:ready', function() {
      const ph = document.getElementById('scene-placeholder');

      // Reveal placeholder with GSAP entrance
      gsap.to(ph, {
        opacity: 1,
        y: 0,
        duration: 1.2,
        ease: 'power3.out',
        delay: 0.2,
      });

      // Update debug badges
      const gsapBadge      = document.getElementById('dbg-gsap');
      const particleBadge  = document.getElementById('dbg-particles');
      const stateBadge     = document.getElementById('dbg-state');

      if (gsapBadge)     gsapBadge.textContent     = `GSAP ${gsap.version} ✓`;
      if (particleBadge) particleBadge.textContent  =
        `${Garden.particles?.opts.maxParticles ?? '?'} Particles ✓`;
      if (stateBadge)    stateBadge.textContent     =
        `State Scene ${Garden.state?.get('scene') ?? '?'} ✓`;

      // Trigger a gold burst from the centre flower icon for fun
      setTimeout(() => {
        const rect = ph.querySelector('svg')?.getBoundingClientRect();
        if (rect && Garden.particles) {
          Garden.particles.goldBurst(
            rect.left + rect.width  / 2,
            rect.top  + rect.height / 2,
            28
          );
        }
      }, 600);
    });
  </script>

</body>
</html>
